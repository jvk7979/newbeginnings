<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The New Beginning — Venture Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,500;0,600;1,700&display=swap" rel="stylesheet" />
</head>
<body>
  <noscript>This app requires JavaScript to run.</noscript>
  <div id="root" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0D0C0A;color:#F2EDE0;font:500 14px/1.4 'DM Sans',sans-serif;">Loading Venture Log…</div>
  <script type="module">
    const root = document.getElementById('root');
    try {
      await import('/src/main.jsx');
    } catch (err) {
      console.error('Failed to boot app entrypoint', err);
      root.innerHTML = `
        <div style="max-width:680px;padding:24px;background:#18160F;border:1px solid #2E2B23;border-radius:10px">
          <h1 style="margin:0 0 10px;font:600 24px/1.2 'Playfair Display',serif;color:#F2EDE0">Venture Log</h1>
          <p style="margin:0 0 12px;color:#A39888">
            The React app entrypoint could not load from <code>/src/main.jsx</code>.
          </p>
          <p style="margin:0;color:#A39888">
            If you are opening <code>index.html</code> directly, run this app with Vite:
            <code style="color:#D4A853">npm install && npm run dev</code>
          </p>
        </div>`;
    }
  </script>
</body>
</html>
