        - generic [ref=e82]: "Andhra Pradesh is a top solar energy producer in India, with over 5,000 MW of installed capacity as of late 2025, contributing significantly to the state's renewable goals. Key projects include the 1,000 MW Kurnool Ultra Mega Solar Park and the 978.5 MW NP Kunta project. The state actively promotes solar adoption through rooftop subsidies via NEDCAP and targets massive capacity expansion. [1, 2, 3, 4, 5] Key Solar Power Aspects in Andhra Pradesh: • Capacity & Projects: The state has more than 5,000 MW of installed capacity. Major projects include the 1,000 MW Kurnool Ultra Mega Solar Park, which was among the world's largest at its commissioning. Other projects include NP Kunta Ultra Mega Solar Park (978.5 MW) and a 50 MW solar thermal plant. • Future Targets: Under the A.P. Integrated Clean Energy Policy-2024, the state is targeting a massive increase in capacity to 78.50 GWp to support industrial and agricultural energy needs. • Solar Initiatives & Subsidies: The New & Renewable Energy Development Corporation of Andhra Pradesh Ltd. (NEDCAP) provides subsidies, including Central Financial Assistance (CFA) for solar rooftop systems. • Floating Solar: Andhra Pradesh has demonstrated leadership in floating solar, including a 2 MW project at Mudasarlova Reservoir and a 25 MW project at NTPC Simhadri. • Major Players: Key developers and partners include NTPC, Greenko, ArcelorMittal, and Adani. • Manufacturing: The state is expanding into manufacturing, with projects like a 6GW solar wafer facility announced in 2026. [1, 2, 4, 5, 6, 7, 8, 9, 10] Solar Incentives (NEDCAP): • With Battery: Rs. 90 per watt. • Without Battery: Rs. 70 per watt or 30% of project cost, whichever is lower. [1] Important Projects: • Kurnool Ultra Mega Solar Park: 1,000 MW, 5,932.32 acres. • NP Kunta Ultra Mega Solar Park: 978.5 MW. • New Developments: Foundation laid in 2023 for 5,314 MW of new capacity including projects in Nandyal and Kurnool districts. [2, 4, 9] AI responses may include mistakes. [1] https://nredcap.in/SolarEnergy.aspx [2] https://ornatesolar.com/blog/potential-of-solar-power-in-andhra-pradesh [3] https://freyrenergy.com/why-is-it-necessary-to-go-solar-in-andhra-pradesh/ [4] https://waaree.com/blog/largest-solar-energy-plants-in-india-2023/ [5] https://www.thehindu.com/news/national/andhra-pradesh/aps-solar-power-generation-capacity-stands-at-5006-mw-says-energy-minister-gottipati-ravi-kumar/article70066270.ece [6] https://en.wikipedia.org/wiki/Solar_power_in_India [7] https://m.economictimes.com/industry/renewables/andhra-pradesh-okays-adani-solar-power-deal-with-rider/articleshow/128895061.cms [8] https://www.facebook.com/MeilGroupOfficial/videos/turning-sunlight-into-sustainable-power/890104360190506/ [9] https://www.thehindu.com/news/national/andhra-pradesh/andhra-pradesh-chief-minister-lays-foundation-for-three-renewable-energy-projects-with-a-total-capacity-of-5314mw/article67226543.ece [10] https://www.youtube.com/watch?v=4SSpdjKVlB8"
